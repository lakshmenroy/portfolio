<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Laksh Menroy</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f0f4ff;color:#0f172a;
         display:flex;align-items:center;justify-content:center;min-height:100vh;
         text-align:center;padding:24px}
    .num{font-size:clamp(6rem,20vw,10rem);font-weight:900;
         background:linear-gradient(135deg,#1d4ed8,#dc2626);
         -webkit-background-clip:text;-webkit-text-fill-color:transparent;
         background-clip:text;line-height:1;margin-bottom:16px}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:12px}
    p{color:#64748b;margin-bottom:32px;line-height:1.7}
    a{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;
      background:linear-gradient(135deg,#1d4ed8,#dc2626);color:#fff;
      border-radius:8px;font-weight:600;text-decoration:none;
      transition:transform .2s,box-shadow .2s}
    a:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(29,78,216,.4)}
  </style>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>Looks like this page doesn't exist (yet).<br/>Head back home to explore my work.</p>
    <a href="/">← Back to Portfolio</a>
  </div>
</body>
</html>
